            const ws = document.getElementById('workspace');
            const availW = (ws ? ws.clientWidth : window.innerWidth) - 40;

            // tight, up to fill when there is room) keeping the size ratio consistent.

            if (Math.abs(dx) > 2 || Math.abs(dy) > 2) dragState.isDragging = true;
            if (!dragState.isDragging) return;

            // ── Multi/Group move ──
            if (dragState.type === 'multiMove' || dragState.type === 'groupMove') {
                const { startPositions, wrappers, elementIds } = dragState;
                const selectedEls = elementIds.map(id => findElement(id)).filter(Boolean);
                if (selectedEls.length === 0) return;
                const currentBbox = getBoundingBox(selectedEls);
                if (!currentBbox) return;
                let newX = currentBbox.x + dx;
                let newY = currentBbox.y + dy;
                if (snapEnabled) {
                    const snapResult = findSnapPositionForGroup(selectedEls, elementIds);
                    if (snapResult) {
                        if (snapResult.x !== null && Math.abs(newX - snapResult.x) < SNAP_THRESHOLD * 2) {
                            newX = snapResult.x;
                            if (snapResult.vGuide !== null) showSnapGuides(null, snapResult.vGuide);
                        }
                        if (snapResult.y !== null && Math.abs(newY - snapResult.y) < SNAP_THRESHOLD * 2) {
                            newY = snapResult.y;
                            if (snapResult.hGuide !== null) showSnapGuides(snapResult.hGuide, null);
                        }
                    } else { hideSnapGuides(); }
                } else { hideSnapGuides(); }
                const offsetX = newX - currentBbox.x;
                const offsetY = newY - currentBbox.y;
                startPositions.forEach(pos => {
                    const el = findElement(pos.id);
                    if (el) {
                        el.x = Math.max(0, pos.x + offsetX);
                        el.y = Math.max(0, pos.y + offsetY);
                        const wrapper = wrappers[el.id];
                        if (wrapper) {
                            wrapper.style.left = el.x + 'px';
                            wrapper.style.top = el.y + 'px';
                        }
                    }
                });
                updatePropertyValues();
                return;
            }

            // ── Multi/Group resize ──
            if (dragState.type === 'multiResize' || dragState.type === 'groupResize') {
                const { startBbox, startData, wrappers, isTextGroup } = dragState;
                const newW = Math.max(50, startBbox.w + dx);
                const newH = Math.max(50, startBbox.h + dy);
                const sx = newW / startBbox.w;
                const sy = newH / startBbox.h;
                startData.forEach(data => {
                    const el = findElement(data.id);
                    if (el) {
                        const newX = startBbox.x + data.rx * newW;
                        const newY = startBbox.y + data.ry * newH;
                        const newWidth = data.rw * newW;
                        const newHeight = data.rh * newH;
                        el.x = Math.max(0, newX);
                        el.y = Math.max(0, newY);
                        el.width = Math.max(24, newWidth);
                        el.height = Math.max(24, newHeight);
                        if (isTextGroup && el.fontSize) {
                            const baseSize = parseFloat(data.fontSize) || 13;
                            const scale = Math.min(sx, sy);
                            el.fontSize = Math.max(6, Math.round(baseSize * scale)) + 'px';
                        }
                        const wrapper = wrappers[el.id];
                        if (wrapper) {
                            wrapper.style.left = el.x + 'px';
                            wrapper.style.top = el.y + 'px';
                            wrapper.style.width = el.width + 'px';
                            wrapper.style.height = el.height + 'px';
                            if (isTextGroup) {
                                const rendered = wrapper.querySelector('.rendered');
                                if (rendered) rendered.style.fontSize = el.fontSize;
                            }
                        }
                    }
                });
                updatePropertyValues();
                hideSnapGuides();
                return;
            }

            // ── Single move ──
            if (dragState.type === 'move') {
                const { id, startLeft, startTop } = dragState;
                const el = findElement(id);
                if (!el) return;
                const wrapper = document.querySelector(`.element-wrapper[data-id="${id}"]`);
                if (!wrapper) return;
                let newX = Math.max(0, startLeft + dx),
                    newY = Math.max(0, startTop + dy);
                if (snapEnabled) {
                    const snapResult = findSnapPosition(id, null);
                    if (snapResult) {
                        if (snapResult.x !== null && Math.abs(newX - snapResult.x) < SNAP_THRESHOLD * 2) {
                            newX = snapResult.x;
                            if (snapResult.vGuide !== null) showSnapGuides(null, snapResult.vGuide);
                        }
                        if (snapResult.y !== null && Math.abs(newY - snapResult.y) < SNAP_THRESHOLD * 2) {
                            newY = snapResult.y;
                            if (snapResult.hGuide !== null) showSnapGuides(snapResult.hGuide, null);
                        }
                    } else hideSnapGuides();
                } else hideSnapGuides();
                el.x = newX;
                el.y = newY;
                wrapper.style.left = newX + 'px';
                wrapper.style.top = newY + 'px';
                updatePropertyValues();
                return;
            }

            // ── Single resize (fixed: rotation-aware, no sliding) ──
            if (dragState.type === 'resize') {
                const { id, startWidth, startHeight, startLeft, startTop, startAspect, startFontSize, isText, direction,
                    cos, sin } = dragState;
                const el = findElement(id);
                if (!el) return;
                const wrapper = document.querySelector(`.element-wrapper[data-id="${id}"]`);
                if (!wrapper) return;

                // Transform delta into element's local space
                const localDx = dx * cos + dy * sin;
                const localDy = -dx * sin + dy * cos;

                let dw = 0,
                    dh = 0;
                if (direction.includes('e')) dw = localDx;
                else if (direction.includes('w')) dw = -localDx;
                if (direction.includes('s')) dh = localDy;
                else if (direction.includes('n')) dh = -localDy;

                let newW = Math.max(24, startWidth + dw);
                let newH = Math.max(24, startHeight + dh);

                if (el.maintainAspect) {
                    const aspect = startAspect || (startWidth / startHeight);
                    if (direction.includes('e') || direction.includes('w')) {
                        newH = newW / aspect;
                    } else {
                        newW = newH * aspect;
                    }
                    newW = Math.max(24, newW);
                    newH = Math.max(24, newH);
                }

                const actualDw = newW - startWidth;
                const actualDh = newH - startHeight;

                let shiftX = 0,
                    shiftY = 0;
                if (direction.includes('w')) shiftX = -actualDw;
                if (direction.includes('n')) shiftY = -actualDh;

                // Convert local shifts to global
                const globalShiftX = shiftX * cos - shiftY * sin;
                const globalShiftY = shiftX * sin + shiftY * cos;

                // Use start position + accumulated shift (no drift)
                let newX = startLeft + globalShiftX;
                let newY = startTop + globalShiftY;

                // Clamp to frame bounds
                newX = Math.max(0, newX);
                newY = Math.max(0, newY);

                el.x = newX;
                el.y = newY;
                el.width = newW;
                el.height = newH;

                if (isText && el.fontSize) {
                    const baseSize = startFontSize || 13;
                    const ratio = Math.sqrt((newW / startWidth) * (newH / startHeight));
                    const dampedRatio = 1 + (ratio - 1) * 0.6;
                    const newSize = Math.max(6, Math.round(baseSize * dampedRatio));
                    el.fontSize = newSize + 'px';
                    const rendered = wrapper.querySelector('.rendered');
                    if (rendered) rendered.style.fontSize = el.fontSize;
                }

                wrapper.style.left = el.x + 'px';
                wrapper.style.top = el.y + 'px';
                wrapper.style.width = el.width + 'px';
                wrapper.style.height = el.height + 'px';

                updatePropertyValues();
                hideSnapGuides();
            }
        });

        document.addEventListener('mouseup', () => {
            if (dragState) {
                if (dragState.isDragging) {
                    pushHistory();
                    render();
                }
                dragState = null;
                hideSnapGuides();
                document.body.style.cursor = '';
                document.querySelectorAll('.element-wrapper').forEach(w => {
                    w.style.cursor = 'grab';
                    const rendered = w.querySelector('.rendered');

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  DUPLICATE, SAVE CUSTOM
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function duplicateSelected() {
            const selected = getSelectedElements();
            if (selected.length === 0) return;
            const newElements = [];
            selected.forEach(el => {
                const clone = JSON.parse(JSON.stringify(el));
                clone.id = generateId();
                clone.x += 20;
                clone.y += 20;
                newElements.push(clone);
            });
            elements.push(...newElements);
            selectedIds = newElements.map(el => el.id);
            render();
            pushHistory();
        }

        function saveCustomTemplate() {
            if (elements.length === 0) { alert('No elements to save.'); return; }
            customTemplate = JSON.parse(JSON.stringify(elements));
            customTemplate._frame = JSON.parse(JSON.stringify(frame));
            localStorage.setItem('customTemplate', JSON.stringify(customTemplate));
            alert('✅ Custom template saved!');
            const select = document.getElementById('templateSelect');
            let hasCustom = false;
            for (const opt of select.options)
                if (opt.value === 'custom') { hasCustom = true; break; }
            if (!hasCustom) {
                const opt = document.createElement('option');
                opt.value = 'custom';
                opt.textContent = '✨ Custom (saved)';
                select.appendChild(opt);
            }
        }

        function loadCustomTemplate() {
            if (!customTemplate) {
                const stored = localStorage.getItem('customTemplate');
                if (stored) {
                    try { customTemplate = JSON.parse(stored); } catch (e) { customTemplate = null; }
                }
            }
            if (!customTemplate || !Array.isArray(customTemplate)) {
                alert('No custom template found.');
                return;
            }
            if (elements.length > 0) {
                if (!confirm('Replace current content?')) return;
            }
            if (editingId !== null) saveInlineEdit(editingId);
            if (customTemplate._frame) {
                Object.assign(frame, customTemplate._frame);
                delete customTemplate._frame;
            }
            elements = JSON.parse(JSON.stringify(customTemplate));
            let maxId = 0;
            elements.forEach(el => {
                if (el.id > maxId) maxId = el.id;
                if (el.fontFamily === undefined) el.fontFamily = frame.fontFamily;
            });
            nextId = maxId + 1;
            selectedIds = elements.length > 0 ? [elements[0].id] : [];
            render();
            pushHistory();
            document.getElementById('workspace').scrollTop = 0;
            markUnsaved();
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

                const bgColorSection = document.getElementById('frameBgColorSection');

            const textDecorSelect = document.getElementById('propTextDecor');

        function attachPropertyListeners() {
            if (window._propertyListenersAttached) return;
            window._propertyListenersAttached = true;

            const propMappings = {
                'propX': { prop: 'x', max: frame.width, min: 0 },
                'propXRange': { prop: 'x', max: frame.width, min: 0 },
                'propY': { prop: 'y', max: 800, min: 0 },
                'propYRange': { prop: 'y', max: 800, min: 0 },
                'propW': { prop: 'width', max: frame.width, min: 20 },
                'propWRange': { prop: 'width', max: frame.width, min: 20 },
                'propH': { prop: 'height', max: 800, min: 20 },
                'propHRange': { prop: 'height', max: 800, min: 20 },
                'propBlur': { prop: 'blur', max: 20, min: 0 },
                'propBlurRange': { prop: 'blur', max: 20, min: 0 },
                'propOpacity': { prop: 'opacity', max: 1, min: 0 },
                'propOpacityRange': { prop: 'opacity', max: 1, min: 0 },
                'propBorderWidth': { prop: 'borderWidth', max: 50, min: 0 },
                'propBorderWidthRange': { prop: 'borderWidth', max: 50, min: 0 },
                'propPaddingTop': { prop: 'paddingTop', max: 100, min: 0 },
                'propPaddingTopRange': { prop: 'paddingTop', max: 100, min: 0 },
                'propPaddingRight': { prop: 'paddingRight', max: 100, min: 0 },
                'propPaddingRightRange': { prop: 'paddingRight', max: 100, min: 0 },
                'propPaddingBottom': { prop: 'paddingBottom', max: 100, min: 0 },
                'propPaddingBottomRange': { prop: 'paddingBottom', max: 100, min: 0 },
                'propPaddingLeft': { prop: 'paddingLeft', max: 100, min: 0 },
                'propPaddingLeftRange': { prop: 'paddingLeft', max: 100, min: 0 },
                'propFontSize': { prop: 'fontSize', max: 72, min: 6 },
                'propFontSizeRange': { prop: 'fontSize', max: 72, min: 6 },
            };

            Object.keys(propMappings).forEach(id => {
                const input = document.getElementById(id);
                if (input) {
                    if (!input._listenerAttached) {
                        input._listenerAttached = true;
                        input.addEventListener('input', function(e) {
                            e.stopPropagation();
                            if (isUpdatingInputs) return;
                            const selected = getFirstSelected();
                            if (!selected || selected === 'frame') return;
                            const mapping = propMappings[id];
                            let value = parseFloat(this.value);
                            if (isNaN(value)) return;
                            value = Math.min(mapping.max, Math.max(mapping.min, value));
                            if (mapping.prop === 'fontSize') {
                                selected.fontSize = value + 'px';
                            } else {
                                selected[mapping.prop] = value;
                            }

                            const pairedId = id.includes('Range') ? id.replace('Range', '') : id + 'Range';
                            const paired = document.getElementById(pairedId);
                            if (paired && paired !== this) {
                                isUpdatingInputs = true;
                                paired.value = value;
                                isUpdatingInputs = false;
                            }

                            // Update the wrapper directly without full re-render
                            const wrapper = document.querySelector(`.element-wrapper[data-id="${selected.id}"]`);
                            if (wrapper) {
                                if (mapping.prop === 'x') wrapper.style.left = value + 'px';
                                else if (mapping.prop === 'y') wrapper.style.top = value + 'px';
                                else if (mapping.prop === 'width') wrapper.style.width = value + 'px';
                                else if (mapping.prop === 'height') wrapper.style.height = value + 'px';
                                else if (mapping.prop === 'borderWidth') {
                                    wrapper.style.borderWidth = value + 'px';
                                } else if (mapping.prop === 'fontSize') {
                                    const rendered = wrapper.querySelector('.rendered');
                                    if (selected.textPathType && selected.textPathType !== 'none') {
                                        if (!_isSliderDragging) {
                                            liveUpdateElement(selected.id);
                                        }
                                    } else if (rendered) {
                                        rendered.style.fontSize = value + 'px';
                                    }
                                } else {
                                    wrapper.style.cssText = buildElementStyles(selected);
                                }
                            }
                            // Update property panel values
                            updatePropertyValues();
                            updateCodeEditor();
                            markUnsaved();
                        });
                        input.addEventListener('change', function() {
                            const selected = getFirstSelected();
                            if (!selected || selected === 'frame') return;
                            if (selected.textPathType && selected.textPathType !== 'none') {
                                liveUpdateElement(selected.id);
                            }
                        });
                    }
                }
            });
        }

        function updateFrame() {
            if (isUpdatingFrame) return;
            isUpdatingFrame = true;
            const val = parseFloat(this.value);
            if (isNaN(val)) { isUpdatingFrame = false; return; }
            const id = this.id;
            const propMap = {
                'framePadding': 'padding',
                'framePaddingRange': 'padding',
                'frameBorderWidth': 'borderWidth',
                'frameBorderWidthRange': 'borderWidth',
                'frameBorderRadius': 'borderRadius',
                'frameBorderRadiusRange': 'borderRadius',
                'frameBorderRadiusTL': 'borderRadiusTL',
                'frameBorderRadiusTLRange': 'borderRadiusTL',
                'frameBorderRadiusTR': 'borderRadiusTR',
                'frameBorderRadiusTRRange': 'borderRadiusTR',
                'frameBorderRadiusBL': 'borderRadiusBL',
                'frameBorderRadiusBLRange': 'borderRadiusBL',
                'frameBorderRadiusBR': 'borderRadiusBR',
                'frameBorderRadiusBRRange': 'borderRadiusBR',
            };
            const prop = propMap[id];
            if (prop) {
                frame[prop] = val;
                const pairedId = id.includes('Range') ? id.replace('Range', '') : id + 'Range';
                const paired = document.getElementById(pairedId);
                if (paired && paired !== this) paired.value = val;
                updateFrameStyles();
                markUnsaved();
            }
            isUpdatingFrame = false;
        }

        function updateFrameSelects() {

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  INLINE EDITING - with Enter key support
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function startInlineEdit(id) {
            const el = findElement(id);
            if (!el || !isTextTag(el.tag)) return;
            if (editingId !== null) saveInlineEdit(editingId);
            editingId = id;
            render();
            const wrapper = document.querySelector(`.element-wrapper[data-id="${id}"]`);
            if (wrapper) {
                const rendered = wrapper.querySelector('.rendered');
                if (rendered) {
                    rendered.contentEditable = 'true';
                    try { document.execCommand('defaultParagraphSeparator', false, 'br'); } catch(e) {}
                    rendered.focus();
                    const range = document.createRange();
                    range.selectNodeContents(rendered);
                    const sel = window.getSelection();
                    sel.removeAllRanges();
                    sel.addRange(range);

                    setInlineEditTarget(rendered);

                    rendered.addEventListener('paste', function(e) {
                        e.preventDefault();
                        const text = (e.clipboardData || window.clipboardData).getData('text/plain');
                        const processed = text.replace(/\n/g, '<br>');
                        document.execCommand('insertHTML', false, processed);
                        const el2 = findElement(id);
                        if (el2) {
                            el2.content = htmlToPlainText(rendered.innerHTML);
                            updateCodeEditor();
                            markUnsaved();
                        }
                    });

                    rendered.addEventListener('input', function() {
                        const el2 = findElement(id);
                        if (el2) {
                            el2.content = htmlToPlainText(this.innerHTML);
                            const currentStyle = this.style.cssText;
                            this.style.cssText = currentStyle;
                            updatePropertyValues();
                            updateCodeEditor();
                            markUnsaved();
                        }
                    });
                    rendered.addEventListener('blur', function() {
                        saveInlineEdit(id);
                    });
                }
            }
            updateFormatToolbar();
        }

        // Single document-level Enter handler so new lines work reliably while editing text
        let _inlineEditTarget = null;
        function setInlineEditTarget(rendered) { _inlineEditTarget = rendered; }
        document.addEventListener('keydown', function(e) {
            if (editingId === null || !_inlineEditTarget) return;
            if (e.key !== 'Enter') return;
            e.preventDefault();
            e.stopPropagation();
            const rendered = _inlineEditTarget;
            const sel = window.getSelection();
            if (!sel.rangeCount) return;
            const range = sel.getRangeAt(0);
            range.deleteContents();
            const br = document.createElement('br');
            range.insertNode(br);
            range.setStartAfter(br);
            range.collapse(true);
            sel.removeAllRanges();
            sel.addRange(range);
            updatePropertyValues();
            updateCodeEditor();
            markUnsaved();
        });

        // Delegated double-click handler so inline editing is reliably activated
        // for text elements (in addition to the per-wrapper listener).
        document.addEventListener('dblclick', function(e) {
            if (editingId !== null) return;
            const rendered = e.target.closest && e.target.closest('.rendered');
            if (!rendered) return;
            const id = parseInt(rendered.dataset.id);
            const el = findElement(id);
            if (el && isTextTag(el.tag)) {
                startInlineEdit(id);
            }
        });

        function saveInlineEdit(id) {
            if (editingId !== id) return;
            const el = findElement(id);
            const wrapper = document.querySelector(`.element-wrapper[data-id="${id}"]`);
            if (wrapper && el) {
                const rendered = wrapper.querySelector('.rendered');
                if (rendered) {
                    el.content = htmlToPlainText(rendered.innerHTML);
                    rendered.contentEditable = 'false';
                    const currentStyle = rendered.style.cssText;
                    rendered.style.cssText = currentStyle;
                    updatePropertyValues();
                    updateCodeEditor();
                    pushHistory();
                }
            }
            editingId = null;
            _inlineEditTarget = null;
        }

        function cancelInlineEdit() {
            editingId = null;
            _inlineEditTarget = null;
            render();
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  ADD / DELETE / CLEAR
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function addElement(tag) {
            if (tag === 'li') {
                const selected = getFirstSelected();
                if (selected && selected !== 'frame' && isListTag(selected.tag)) {
                    const items = selected.listItems || [];
                    items.push('New item');
                    selected.listItems = items;
                    render();
                    pushHistory();
                    return;
                }
                const ul = createDefaultElement('ul');
                ul.listItems = ['New item'];
                const sel = getFirstSelected();
                if (sel && sel !== 'frame' && sel.groupId) ul.groupId = sel.groupId;
                elements.push(ul);
                selectedIds = [ul.id];
                render();
                pushHistory();
                return;
            }
            const el = createDefaultElement(tag);
            if (isTextTag(tag) && el.content) {
                const fs = parseFloat(el.fontSize) || 13;
                el.height = Math.max(40, estimateTextHeight(el.content, fs, el.width));
            }
            const maxX = frame.width - el.width - 16;
            el.x = Math.min(Math.max(8, el.x || 30), Math.max(8, maxX));
            el.y = Math.min(Math.max(8, el.y || 30), Math.max(8, 500));
            const maxZ = elements.reduce((max, e) => Math.max(max, e.zIndex || 0), 0);
            el.zIndex = maxZ + 1;
            const selected = getFirstSelected();
            if (selected && selected !== 'frame' && selected.groupId) el.groupId = selected.groupId;
            elements.push(el);
            selectedIds = [el.id];
            render();
            pushHistory();
        }

        function addShape(shape) {
            const el = createDefaultElement('span', shape);
            el.width = 100;
            el.height = shape === 'circle' ? 100 : (shape === 'triangle' ? 86 : (shape === 'star' ? 100 : 100));
            el.background = shape === 'rect' ? '#4f46e5' : (shape === 'circle' ? '#db2777' : (shape === 'triangle' ?
                '#059669' : '#d97706'));
            el.borderRadius = shape === 'circle' ? '50%' : '0px';
            el.content = '';
            el.shape = shape;
            if (shape === 'triangle' || shape === 'star' || shape === 'circle') el.maintainAspect = true;
            else el.maintainAspect = false;
            el.x = Math.random() * (frame.width - 120);
            el.y = Math.random() * 300;
            const maxZ = elements.reduce((max, e) => Math.max(max, e.zIndex || 0), 0);
            el.zIndex = maxZ + 1;
            const selected = getFirstSelected();
            if (selected && selected !== 'frame' && selected.groupId) el.groupId = selected.groupId;
            elements.push(el);
            selectedIds = [el.id];
            render();
            pushHistory();
        }

        function deleteElement(id) {
            if (editingId !== null) saveInlineEdit(editingId);
            elements.forEach(el => { if (el.maskId === id) el.maskId = null; });
            const el = findElement(id);
            if (el && el.groupId) {
                const groupMembers = getGroupElements(el.groupId);
                if (groupMembers.length <= 1) groupMembers.forEach(m => m.groupId = null);
            }
            elements = elements.filter(e => e.id !== id);
            selectedIds = selectedIds.filter(sid => sid !== id);
            render();
            pushHistory();
        }

        function clearAll() {
            if (elements.length === 0) return;
            if (!confirm('Delete all elements?')) return;
            if (editingId !== null) saveInlineEdit(editingId);
            elements = [];
            selectedIds = [];
            render();
            pushHistory();
            markUnsaved();
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  LAYER, GROUP
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function normalizeZIndices() {
            const sorted = [...elements].sort((a, b) => (a.zIndex || 0) - (b.zIndex || 0));
            sorted.forEach((el, i) => { el.zIndex = i + 1; });
        }

        function bringForward() {
            const selected = getSelectedElements();
            if (selected.length === 0) return;
            normalizeZIndices();
            const selIds = new Set(selected.map(el => el.id));
            const sorted = [...elements].sort((a, b) => a.zIndex - b.zIndex);
            for (let i = sorted.length - 2; i >= 0; i--) {
                const el = sorted[i];
                if (selIds.has(el.id)) {
                    const above = sorted[i + 1];
                    if (!selIds.has(above.id)) {
                        const tmp = el.zIndex;
                        el.zIndex = above.zIndex;
                        above.zIndex = tmp;
                        sorted[i] = above;
                        sorted[i + 1] = el;
                    }
                }
            }
            render();
            pushHistory();
        }

        function sendBackward() {
            const selected = getSelectedElements();
            if (selected.length === 0) return;
            normalizeZIndices();
            const selIds = new Set(selected.map(el => el.id));
            const sorted = [...elements].sort((a, b) => a.zIndex - b.zIndex);
            for (let i = 1; i < sorted.length; i++) {
                const el = sorted[i];
                if (selIds.has(el.id)) {
                    const below = sorted[i - 1];
                    if (!selIds.has(below.id)) {
                        const tmp = el.zIndex;
                        el.zIndex = below.zIndex;
                        below.zIndex = tmp;
                        sorted[i] = below;
                        sorted[i - 1] = el;
                    }
                }
            }
            render();
            pushHistory();
        }

        function bringToFront() {
            const selected = getSelectedElements();
            if (selected.length === 0) return;
            normalizeZIndices();
            const maxZ = elements.reduce((max, e) => Math.max(max, e.zIndex || 0), 0);
            const selIds = new Set(selected.map(el => el.id));
            selected.sort((a, b) => a.zIndex - b.zIndex).forEach((el, i) => { el.zIndex = maxZ + 1 + i; });
            normalizeZIndices();
            render();
            pushHistory();
        }

        function sendToBack() {
            const selected = getSelectedElements();
            if (selected.length === 0) return;
            normalizeZIndices();
            const selIds = new Set(selected.map(el => el.id));
            selected.sort((a, b) => b.zIndex - a.zIndex).forEach((el, i) => { el.zIndex = -(i + 1); });
            normalizeZIndices();
            render();
            pushHistory();
        }

        function groupElements() {
            const selected = getSelectedElements();
            if (selected.length < 2) { alert('Select at least 2 elements.'); return; }
            let existingGroupId = null;
            for (const el of selected)
                if (el.groupId) { existingGroupId = el.groupId; break; }
            const groupId = existingGroupId || nextGroupId++;
            selected.forEach(el => el.groupId = groupId);
            render();
            pushHistory();
        }

        function ungroupElements() {
            const selected = getSelectedElements();
            if (selected.length === 0) return;
            selected.forEach(el => el.groupId = null);
            render();
            pushHistory();
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  PASTE, TEMPLATE, EXPORT
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function pasteHTML() {
            alert('Paste HTML function available. Use the button.');
        }

        function applyTemplate(name) {
            if (name === 'custom') { loadCustomTemplate(); return; }
            if (elements.length > 0 && !confirm('Replace current content with template?')) return;
            if (editingId !== null) saveInlineEdit(editingId);
            const templateFn = TEMPLATES[name];
            if (!templateFn) return;
            elements = templateFn();
            selectedIds = elements.length > 0 ? [elements[0].id] : [];
            let maxId = 0;
            elements.forEach(el => { if (el.id > maxId) maxId = el.id; });
            nextId = maxId + 1;
            render();
            pushHistory();
            document.getElementById('workspace').scrollTop = 0;
            markUnsaved();
            setTimeout(() => { updateFrameWidth();
                updateWidthIndicator(); }, 100);
        }

        function updateFormatToolbar() { /* minimal */ }

        function escapeAttrStr(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        const EXPORT_TAGS = ['a', 'p', 'i', 'strong', 'b', 'u', 'ul', 'ol', 'li', 'h1', 'h2', 'h3', 'img', 'font', 'br', 'span'];

        // The generated output may only use a fixed set of tags. Internally the app
        // uses <span> for shapes and decorative backgrounds; these are exported as
        // <font> (an allowed tag) styled as a block so the output stays within spec.
        function getExportTagName(el) {
            if (el.tag === 'span') return 'font';
            return el.tag;
        }

        function buildElementExportStyle(el) {
            const tag = el.tag;
            if (!EXPORT_TAGS.includes(tag)) return '';
            const exportTag = getExportTagName(el);
            const isExportText = isTextTag(tag) || tag === 'span';
            let style = `position:absolute;left:${el.x || 0}px;top:${el.y || 0}px;width:${el.width || 200}px;height:${el.height || 60}px;display:block;overflow:visible;`;
            if (isListTag(tag)) style += `list-style-type:${el.listStyle || 'disc'};padding-left:20px;`;
            if (el.bgMode === 'image' && el.bgImageData) style += `background-image:url('${el.bgImageData}');background-size:cover;background-position:center;background-repeat:no-repeat;`;
            else if (el.background && el.background !== 'transparent') style += `background:${el.background};`;
            if (el.paddingTop || el.paddingRight || el.paddingBottom || el.paddingLeft) style += `padding:${el.paddingTop || 0}px ${el.paddingRight || 0}px ${el.paddingBottom || 0}px ${el.paddingLeft || 0}px;`;

            const tl = parseFloat(el.borderRadiusTL) || 0, tr = parseFloat(el.borderRadiusTR) || 0, br = parseFloat(el.borderRadiusBR) || 0, bl = parseFloat(el.borderRadiusBL) || 0;
            if (tl > 0 || tr > 0 || br > 0 || bl > 0) style += `border-radius:${tl}px ${tr}px ${br}px ${bl}px;`;
            else if (el.borderRadius && el.borderRadius !== '0px' && el.borderRadius !== '0') style += `border-radius:${el.borderRadius};`;
            style += `border-width:${el.borderWidth || 0}px;border-style:${el.borderStyle || 'solid'};border-color:${el.borderColor || '#000000'};`;
            if (el.textDirection && el.textDirection !== 'ltr') style += `direction:${el.textDirection};`;
            style += `z-index:${el.zIndex || 1};`;
            if (el.shape === 'triangle') style += `clip-path:polygon(50% 0%,0% 100%,100% 100%);`;
            else if (el.shape === 'star') style += `clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);`;
            if (el.rotation) style += `transform:rotate(${el.rotation}deg);`;

            // Text properties inherited from frame so the export matches the UI
            if (isTextTag(tag)) {
                const fam = (el.fontFamily && el.fontFamily !== frame.fontFamily) ? el.fontFamily : '';
                style += `font-family:${fam || frame.fontFamily};`;
                style += `font-size:${parseInt(el.fontSize) || 13}px;`;
                style += `font-weight:${el.fontWeight || 'normal'};`;
                style += `font-style:${el.fontStyle || 'normal'};`;
                style += `text-decoration:${el.textDecoration || 'none'};`;
                style += `color:${el.color || frame.color};`;
                style += `text-align:${el.textAlign || 'center'};`;
            }

            // Combine all effects + blur into a single filter (so they stack)
            const filterParts = [];
            if (el.shadow) filterParts.push(`drop-shadow(${el.shadowOffsetX}px ${el.shadowOffsetY}px ${el.shadowBlur}px ${el.shadowColor})`);
            if (el.glow) {
                const gc = el.glowColor || '#4f46e5', gb = el.glowBlur || 10, gi = Math.max(1, el.glowIntensity || 1);
                for (let i = 1; i <= gi * 2; i++) filterParts.push(`drop-shadow(0 0 ${gb * i * 2}px ${gc})`);
            }
            if (el.bevel) {
                const bs = el.bevelSize || 4, bb = el.bevelBlur || 2;
                filterParts.push(`drop-shadow(-${bs}px -${bs}px ${bb}px #ffffff)`);
                filterParts.push(`drop-shadow(${bs}px ${bs}px ${bb}px ${el.bevelColor || '#000000'})`);
            }
            if (el.echo) {
                const ec = el.echoColor || '#000000', ed = el.echoDistance || 8, eb = el.echoBlur || 4, ecn = el.echoCount || 5;
                for (let i = 1; i <= ecn; i++) {
                    const f = i / ecn;
                    filterParts.push(`drop-shadow(${ed * f}px ${ed * f}px ${eb * f}px ${ec})`);
                }
            }
            if (el.blur) filterParts.push(`blur(${el.blur}px)`);
            if (filterParts.length) style += `filter:${filterParts.join(' ')};`;
            if (el.opacity !== undefined && el.opacity < 1) style += `opacity:${el.opacity};`;

            if (el.maskId) {
                const maskEl = elements.find(e => e.id === el.maskId);
                if (maskEl) {
                    if (isTextTag(maskEl.tag) && maskEl.tag !== 'img' && !maskEl.shape) {
                        style += `-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;`;
                    } else if (maskEl.tag === 'img') {
                        const src = (maskEl.attributes && maskEl.attributes.src) ? maskEl.attributes.src : '';
                        if (src) {
                            const imgX = maskEl.x - el.x;
                            const imgY = maskEl.y - el.y;
                            const clipSvg =
                                `<svg xmlns="http://www.w3.org/2000/svg" width="${el.width}" height="${el.height}"><defs><clipPath id="c"><image href="${escapeHtml(src)}" x="${imgX}" y="${imgY}" width="${maskEl.width}" height="${maskEl.height}" /></clipPath></defs><rect width="100%" height="100%" fill="white" clip-path="url(#c)" /></svg>`;
                            const enc = encodeURIComponent(clipSvg);
                            style += `clip-path:url('data:image/svg+xml,${enc}');-webkit-clip-path:url('data:image/svg+xml,${enc}');`;
                        }
                    } else if (maskEl.shape === 'circle' || (maskEl.tag === 'img' && maskEl.borderRadius === '50%')) {
                        const cx = maskEl.x + maskEl.width / 2 - el.x;
                        const cy = maskEl.y + maskEl.height / 2 - el.y;
                        const r = Math.min(maskEl.width, maskEl.height) / 2;
                        style += `clip-path:circle(${r}px at ${cx}px ${cy}px);-webkit-clip-path:circle(${r}px at ${cx}px ${cy}px);`;
                    } else {
                        const left = Math.max(0, maskEl.x - el.x);
                        const top = Math.max(0, maskEl.y - el.y);
                        const right = Math.max(0, (el.x + el.width) - (maskEl.x + maskEl.width));
                        const bottom = Math.max(0, (el.y + el.height) - (maskEl.y + maskEl.height));
                        const cw = Math.max(1, el.width - left - right);
                        const ch = Math.max(1, el.height - top - bottom);
                        const clipSvg =
                            `<svg xmlns="http://www.w3.org/2000/svg" width="${el.width}" height="${el.height}"><defs><clipPath id="c"><rect x="${left}" y="${top}" width="${cw}" height="${ch}" /></clipPath></defs><rect width="100%" height="100%" fill="white" clip-path="url(#c)"/></svg>`;
                        const enc = encodeURIComponent(clipSvg);
                        style += `clip-path:url('data:image/svg+xml,${enc}');-webkit-clip-path:url('data:image/svg+xml,${enc}');`;
                    }
                }
            }
            return style.replace(/\s+/g, ' ').trim();
        }

        function buildElementInnerForExport(el) {
            const tag = el.tag;
            const attrs = el.attributes || {};
            // Returns ONLY the inner content (no outer tag), so generateFullHTML can
            // wrap it in the element's own (whitelisted) tag.
            if (isListTag(tag)) {
                const items = el.listItems || [];
                return items.map(i => `<li>${escapeAttrStr(i)}</li>`).join('');
            } else if (tag === 'img') {
                return '';
            } else if (tag === 'br') {
                return '';
            } else if (tag === 'font') {
                return nlToBr(el.content || '');
            }
            if (tag === 'li') return nlToBr(el.content || '');
            if (el.textPathType && el.textPathType !== 'none') return buildTextPathSVG(el);
            return nlToBr(el.content || '');
        }

        function buildElementTagForExport(el) {
            const tag = el.tag;
            if (!EXPORT_TAGS.includes(tag)) return '';
            const exportTag = getExportTagName(el);
            const style = buildElementExportStyle(el);
            const attrs = el.attributes || {};
            if (tag === 'img') {
                const tl = parseFloat(el.borderRadiusTL) || 0;
                const tr = parseFloat(el.borderRadiusTR) || 0;
                const br = parseFloat(el.borderRadiusBR) || 0;
                const bl = parseFloat(el.borderRadiusBL) || 0;
                let radiusStr = '0px';
                if (tl > 0 || tr > 0 || br > 0 || bl > 0) {
                    radiusStr = `${tl}px ${tr}px ${br}px ${bl}px`;
                } else if (el.borderRadius && el.borderRadius !== '0px' && el.borderRadius !== '0') {
                    radiusStr = el.borderRadius;
                }
                const imgStyle = `position:absolute;left:${el.x || 0}px;top:${el.y || 0}px;width:${el.width || 200}px;height:${el.height || 60}px;border-radius:${radiusStr};border-width:${el.borderWidth || 0}px;border-style:${el.borderStyle || 'solid'};border-color:${el.borderColor || '#000000'};object-fit:cover;display:block;z-index:${el.zIndex || 1};`;
                return `<img src="${escapeAttrStr(attrs.src)}" alt="${escapeAttrStr(attrs.alt)}" style="${imgStyle}" />`;
            }
            if (tag === 'br') {
                return `<br style="${style}" />`;
            }
            if (tag === 'font') {
                const inner = el.content || '';
                return `<font color="${escapeAttrStr(attrs.color)}" size="${escapeAttrStr(attrs.size)}" face="${escapeAttrStr(attrs.face)}" style="${style}">${inner}</font>`;
            }
            if (tag === 'span') {
                const inner = el.content || '';
                return `<font style="${style}">${inner}</font>`;
            }
            if (isListTag(tag)) {
                const liContent = buildElementInnerForExport(el);
                return `<${exportTag} style="${style}">${liContent}</${exportTag}>`;
            }
            const inner = buildElementInnerForExport(el);
            const attrsStr = Object.entries(attrs).map(([k, v]) => ` ${k}="${escapeAttrStr(v)}"`).join('');
            return `<${exportTag}${attrsStr} style="${style}">${inner}</${exportTag}>`;
        }

        function generateFullHTML() {
            if (elements.length === 0) return '';
            const sorted = [...elements].sort((a, b) => (a.zIndex || 1) - (b.zIndex || 1));
            const designWidth = frame.width || 1000;
            const frameH = computeFrameHeight() || 600;
            const inner = sorted.map(el => {
                const tagHtml = buildElementTagForExport(el);
                return tagHtml ? `      ${tagHtml}` : '';
            }).filter(Boolean).join('\n');
            const tl = frame.borderRadiusTL || 0, tr = frame.borderRadiusTR || 0, br = frame.borderRadiusBR || 0, bl = frame.borderRadiusBL || 0;
            let frameRadius = '';
            if (tl || tr || br || bl) frameRadius = `${tl}px ${tr}px ${br}px ${bl}px`;
            else frameRadius = frame.borderRadius + 'px';
            const frameStyle = `display:block;position:relative;width:100%;max-width:${designWidth}px;min-height:${frameH}px;font-family:${frame.fontFamily};color:${frame.color};padding:${frame.padding}px;background:${(frame.bgMode === 'image' && frame.bgImageData) ? `url('${frame.bgImageData}') center/cover no-repeat` : frame.background};border:${frame.borderWidth}px ${frame.borderStyle} ${frame.borderColor};border-radius:${frameRadius};box-sizing:border-box;margin:0 auto;`;
            return `  <span style="${frameStyle}" id="export-frame">
    <span style="position:relative;width:100%;height:100%;display:block;transform-origin:top center;" id="export-inner">
${inner}
    </span>
  </span>
  <script>
    (function(){
      var f=document.getElementById('export-frame');
      if(!f)return;
      var i=f.getElementById?f.getElementById('export-inner'):f.querySelector('#export-inner');
      if(!i)return;
      var dw=${designWidth};
      function scale(){
        var aw=f.clientWidth;
        var s=Math.min(1,aw/dw);
        i.style.transform='scale('+s+')';
        i.style.width=dw+'px';
        i.style.height='${frameH}px';
      }
      if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',scale);
      else scale();
      window.addEventListener('resize',scale);
    })();
  <\/script>`;
        }

        function updateFrameWidth() {
            let maxWidth = 0;
            for (const el of elements) {
                const right = (el.x || 0) + (el.width || 0) + (frame.padding || 0);
                if (right > maxWidth) maxWidth = right;
            }
            const contentWidth = Math.max(200, Math.min(maxWidth + 40, 1200));
            frame.width = contentWidth;
            const frameContainer = document.getElementById('frame-container');
            if (frameContainer) {
                frameContainer.style.width = (contentWidth + frame.padding * 2) + 'px';
                frameContainer.style.maxWidth = '100%';
            }
            const widthIndicator = document.getElementById('widthIndicator');
            if (widthIndicator) {
                const containerWidth = frameContainer ? frameContainer.offsetWidth || contentWidth : contentWidth;
                widthIndicator.textContent = `📐 ${Math.round(containerWidth)}px / ${Math.round(contentWidth)}px`;
            }
        }

        function updateCodeEditor() {
            if (isCodeEditorUpdating) return;
            const editor = document.getElementById('codeEditor');
            const code = generateFullHTML();
            if (editor.value !== code) editor.value = code;
        }

        function getModelName() {
            const h1 = elements.find(el => el.tag === 'h1');
            let name = (h1 && h1.content) ? h1.content : '';
            name = name.replace(/\s+/g, ' ').trim();
            name = name.replace(/[\\/:*?"<>|]+/g, '').replace(/\s+/g, '_');
            return name || 'design-export';
        }

        function saveHTMLToDisk() {
            const code = generateFullHTML();
            if (!code) { alert('Nothing to save yet.'); return; }
            const suggested = getModelName();
            let filename = prompt('Save HTML as:', suggested);
            if (filename === null) return;
            filename = (filename.trim() || suggested).replace(/[\\/:*?"<>|]+/g, '').replace(/\.html?$/i, '');
            if (!filename) filename = suggested;
            const blob = new Blob([code], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename + '.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            markSaved();
        }

        function fitFrameToContent() {
            if (elements.length === 0) { alert('No elements to fit.'); return; }
            let maxBottom = 0,
                maxRight = 0;
            for (const el of elements) {
                const bottom = (el.y || 0) + (el.height || 0) + (frame.padding || 0);
                const right = (el.x || 0) + (el.width || 0) + (frame.padding || 0);
                if (bottom > maxBottom) maxBottom = bottom;
                if (right > maxRight) maxRight = right;
            }
            const newHeight = Math.max(100, maxBottom + 40);
            const newWidth = Math.max(200, maxRight + 40);
            frame.width = Math.min(newWidth, 1200);
            const frameContainer = document.getElementById('frame-container');
            if (frameContainer) {
                frameContainer.style.minHeight = newHeight + 'px';
                const inner = document.getElementById('frame-inner');
                if (inner) inner.style.minHeight = (newHeight - frame.padding * 2) + 'px';
            }
            updateFrameStyles();
            markUnsaved();
        }

        function updateWidthIndicator() {
            const frameContainer = document.getElementById('frame-container');
            const widthIndicator = document.getElementById('widthIndicator');
            if (!widthIndicator) return;
            let maxWidth = 0;
            for (const el of elements) {
                const right = (el.x || 0) + (el.width || 0) + (frame.padding || 0);
                if (right > maxWidth) maxWidth = right;
            }
            const contentWidth = Math.max(200, Math.min(maxWidth + 40, 1200));
            if (frameContainer) {
                const containerWidth = frameContainer.offsetWidth || contentWidth;
                widthIndicator.textContent = `📐 ${Math.round(containerWidth)}px / ${Math.round(contentWidth)}px`;
                widthIndicator.style.display = 'block';
            } else {
                widthIndicator.textContent = `📐 ${Math.round(contentWidth)}px`;
                widthIndicator.style.display = 'block';
            }
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  INIT
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        document.querySelectorAll('.toolbar button[data-tag]').forEach(btn => {
            btn.addEventListener('click', () => addElement(btn.dataset.tag));
        });
        document.querySelectorAll('.toolbar button[data-shape]').forEach(btn => {
            btn.addEventListener('click', () => addShape(btn.dataset.shape));
        });
        document.getElementById('bringForward').addEventListener('click', bringForward);
        document.getElementById('sendBackward').addEventListener('click', sendBackward);
        document.getElementById('bringToFront').addEventListener('click', bringToFront);
        document.getElementById('sendToBack').addEventListener('click', sendToBack);
        document.getElementById('groupElements').addEventListener('click', groupElements);
        document.getElementById('ungroupElements').addEventListener('click', ungroupElements);
        document.getElementById('clearAll').addEventListener('click', clearAll);
        document.getElementById('pasteHTML').addEventListener('click', pasteHTML);
        document.getElementById('undoBtn').addEventListener('click', undo);
        document.getElementById('redoBtn').addEventListener('click', redo);
        document.getElementById('saveHTML').addEventListener('click', saveHTMLToDisk);
        document.getElementById('saveTemplate').addEventListener('click', saveCustomTemplate);
        document.getElementById('applyTemplate').addEventListener('click', function() {
            const name = document.getElementById('templateSelect').value;
            applyTemplate(name);
        });
        document.getElementById('loadTemplate').addEventListener('click', function() {
            const name = document.getElementById('templateSelect').value;
            applyTemplate(name);
        });

        const snapBtn = document.getElementById('snapToggle');
        snapBtn.classList.remove('active');
        snapBtn.addEventListener('click', function() {
            snapEnabled = !snapEnabled;
            this.classList.toggle('active', snapEnabled);
            hideSnapGuides();
        });

        document.getElementById('fitFrameBtn').addEventListener('click', fitFrameToContent);

        document.querySelectorAll('.align-btn[data-align]').forEach(btn => {
            btn.addEventListener('click', () => alignElements(btn.dataset.align));
        });

        document.getElementById('panelCollapseToggle').addEventListener('click', function() {
            document.getElementById('propertyPanel').classList.toggle('collapsed');
        });
        document.getElementById('codeToggle').addEventListener('click', function() {
            document.getElementById('codePreview').classList.toggle('collapsed');
        });

        const zoomSlider = document.getElementById('zoomSlider');
        const zoomLabel = document.getElementById('zoomLabel');
        zoomSlider.addEventListener('input', function() {
            zoomLevel = parseInt(this.value);
            zoomLabel.textContent = zoomLevel + '%';
            applyZoom(zoomLevel);
        });

        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault();
                undo(); return; }
            if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'Z'))) { e.preventDefault();
                redo(); return; }
            if ((e.ctrlKey || e.metaKey) && e.key === 'd') { e.preventDefault();
                duplicateSelected(); return; }

            if ((e.key === 'Delete' || e.key === 'Backspace') && selectedIds.length > 0 && editingId === null) {
                if (e.target.closest('input') || e.target.closest('textarea') || e.target.closest(
                        '[contenteditable="true"]')) return;
                e.preventDefault();
                const ids = [...selectedIds];
                ids.forEach(id => {
                    elements.forEach(el => { if (el.maskId === id) el.maskId = null; });
                });
                elements = elements.filter(el => !ids.includes(el.id));
                selectedIds = [];
                render();
                pushHistory();
                setTimeout(() => { updatePropertyValues(); }, 50);
                return;
            }

            if (e.key === 'Escape') {
                if (editingId !== null) cancelInlineEdit();
                else { selectedIds = [];
                    render(); }
                document.getElementById('formatToolbar').style.display = 'none';
            }
            if (e.key === 's' && !e.ctrlKey && !e.metaKey && !e.target.closest('input,textarea')) {
                e.preventDefault();
                document.getElementById('snapToggle').click();
            }

            if (selectedIds.length === 1 && selectedIds[0] !== 'frame' && !editingId) {
                const active = document.activeElement;
                if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active
                        .contentEditable === 'true')) return;
                const el = findElement(selectedIds[0]);
                if (!el) return;
                const step = e.shiftKey ? 10 : 1;
                let dx = 0,
                    dy = 0;
                switch (e.key) {
                    case 'ArrowUp':
                        dy = -step;
                        e.preventDefault();
                        break;
                    case 'ArrowDown':
                        dy = step;
                        e.preventDefault();
                        break;
                    case 'ArrowLeft':
                        dx = -step;
                        e.preventDefault();
                        break;
                    case 'ArrowRight':
                        dx = step;
                        e.preventDefault();
                        break;
                    default:
                        return;
                }
                el.x = Math.max(0, (el.x || 0) + dx);
                el.y = Math.max(0, (el.y || 0) + dy);
                const wrapper = document.querySelector(`.element-wrapper[data-id="${el.id}"]`);
                if (wrapper) {
                    wrapper.style.left = el.x + 'px';
                    wrapper.style.top = el.y + 'px';
                }
                updatePropertyValues();
                updateCodeEditor();
                markUnsaved();
            }
        });

        document.getElementById('workspace').addEventListener('mousedown', e => {
            if (e.target.closest('input[type="range"]') || e.target.closest('input, textarea, select')) return;
            if (e.button !== 0) return;
            if (e.button === 0 && (e.target === e.currentTarget || e.target.id === 'emptyState' || e.target.closest(
                    '.workspace-empty'))) {
                if (editingId !== null) saveInlineEdit(editingId);
                selectedIds = ['frame'];
                pushHistory();
                render();
                setTimeout(() => { updatePropertyValues(); }, 50);
            }
        });

        // Load stored custom template
        const stored = localStorage.getItem('customTemplate');
        if (stored) {
            try {
                customTemplate = JSON.parse(stored);
                const select = document.getElementById('templateSelect');
                let hasCustom = false;
                for (const opt of select.options)
                    if (opt.value === 'custom') { hasCustom = true; break; }
                if (!hasCustom) {
                    const opt = document.createElement('option');
                    opt.value = 'custom';
                    opt.textContent = '✨ Custom (saved)';
                    select.appendChild(opt);
                }
            } catch (e) {}
        }

        applyTemplate('profile');

        function setupFrameObserver() {
            const frameContainer = document.getElementById('frame-container');
            if (!frameContainer) return;
            if (window.ResizeObserver) {
                const resizeObserver = new ResizeObserver(() => { updateWidthIndicator(); });
                resizeObserver.observe(frameContainer);
            }
        }
        setupFrameObserver();

        // Re-apply uniform scaling when the browser/viewport is resized
        let _resizeRaf = null;
        window.addEventListener('resize', () => {
            if (_resizeRaf) cancelAnimationFrame(_resizeRaf);
            _resizeRaf = requestAnimationFrame(() => {
                applyZoom(zoomLevel);
                updateFrameWidth();
                updateWidthIndicator();
                updateFrameStyles();
            });
        });

        markSaved();
        console.log('✅ Design Studio Pro – All issues fixed.');
    </script>
</body>
</html>
